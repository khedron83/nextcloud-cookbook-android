name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: true

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk nextcloud-cookbook-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextcloud-cookbook-android
          path: nextcloud-cookbook-android.apk
          retention-days: 30

  release:
    needs: [android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.prerelease) }}
          files: artifacts/**/*.apk
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
